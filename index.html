<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Horse Bloodline</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
:root {
  --bg:#f5f5f5;--surface:#fff;--card:#e8edf5;--text:#1a1a1a;--muted:#666e7a;
  --border:#333; --disabled:#d8d8d8;
  --accent-s:#c0392b;--accent-m:#a0369a;
  --s-green-bg:#d6f0d6; --s-blue-bg:#cce6f4; --m1g-bg:#edf8ed; --m1b-bg:#e8f4ff; --m2p-bg:#fce8f8; --m3s-bg:#fadadd;
  --tree-purple:#c8c0e8;--tree-dkgreen:#4caf50;--tree-e-green:#7dd87a;--tree-g-green:#b8e8b0;--tree-e-blue:#7ac8e8;--tree-g-blue:#b0d8f0;--tree-g-yellow:#f0e0a0;--tree-i-green:#daf0da;--tree-i-blue:#daeef8;--tree-i-yellow:#f8f0d0;--tree-purple2:#b090e0;--tree-orange:#f8c080;--tree-pink:#f8b0d0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);padding:10px;}
h1{text-align:center;font-size:1.2rem;margin-bottom:14px;padding-bottom:8px;border-bottom:3px solid var(--border);}
.tabs{display:flex;gap:6px;margin-bottom:12px;}
.tab-btn{padding:7px 15px;border:1px solid #ccc;background:#fff;border-radius:20px;cursor:pointer;}
.tab-btn.active{background:#555;color:#fff;}
.tab-pane{display:none;}.tab-pane.active{display:block;}
.horse-header{text-align:center;font-weight:700;padding:10px;border-radius:10px;margin-bottom:10px;color:#fff;}
.stallion{background:var(--accent-s);}.mare{background:var(--accent-m);}
.section-card{background:#fff;border:1px solid #ccc;border-radius:10px;padding:10px;margin-bottom:10px;}
.section-title{font-size:.75rem;font-weight:700;margin-bottom:8px;border-bottom:1px solid #eee;}
.clear-btn{width:100%;padding:10px;background:#e74c3c;color:#fff;border:none;border-radius:8px;margin-bottom:12px;font-weight:700;}
.tree-table, .pedigree-table{border-collapse:collapse;width:100%;font-size:.7rem;border:1px solid var(--border);margin-bottom:5px;}
.tree-table td, .pedigree-table td, .pedigree-table th{border:1px solid var(--border);height:28px;text-align:center;position:relative;}
.tree-sex{background:var(--card);width:20px;}
.tree-table input, .pedigree-table input{width:100%;height:100%;border:none;padding:2px;font-size:.7rem;}
.tree-lbl{position:absolute;top:1px;left:1px;font-size:.5rem;color:#999;pointer-events:none;}
.factor-row{display:flex;gap:5px;margin-bottom:8px;}
.fc{flex:1;background:var(--card);border:1px solid #ccc;border-radius:5px;text-align:center;padding:2px;}
.fc .fl{font-size:.55rem;display:block;}
.fc .fv{font-size:.9rem;font-weight:700;}
.blood-box{border-radius:8px;padding:5px 10px;margin-top:5px;font-size:.7rem;}
.bb-mg{background:var(--m1g-bg);border:1px solid #a0d8a0;}
.bb-mb{background:var(--m1b-bg);border:1px solid #a0c8e8;}
.bb-mp{background:var(--m2p-bg);border:1px solid #e090c0;}
.bb-ms{background:var(--m3s-bg);border:1px solid #e09080;}
.btags{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;}
.btag{background:rgba(255,255,255,0.6);padding:1px 5px;border-radius:3px;border:1px solid #ddd;}
</style>
</head>
<body>
<h1>♂ 牡馬 × ♀ 牝馬 血統メモ</h1>
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab(0)">馬 1</button>
  <button class="tab-btn" onclick="switchTab(1)">馬 2</button>
  <button class="tab-btn" onclick="switchTab(2)">馬 3</button>
  <button class="tab-btn" onclick="switchTab(3)">馬 4</button>
</div>
<div id="tab0" class="tab-pane active"></div>
<div id="tab1" class="tab-pane"></div>
<div id="tab2" class="tab-pane"></div>
<div id="tab3" class="tab-pane"></div>

<script>
const N=4; const FACTORS=['速','長','短','中','走'];
function build(h){
  let html = `<button class="clear-btn" onclick="clearAll(${h})">馬${h+1} 全クリア</button>`;
  html += `<div class="horse-header stallion">牡馬 ${h+1}</div>`;
  html += `<div class="section-card"><div class="section-title">種馬マトリクス</div>${mkMx(h,'sdt',15)}</div>`;
  html += `<div class="section-card"><div class="section-title">因子合計（牡・牝・最終）</div>`;
  ['s','m','f'].forEach(t=>{ html+=`<div class="factor-row">`; FACTORS.forEach(f=>{ html+=`<div class="fc"><span class="fl">${f}(${t==='s'?'牡':t==='m'?'牝':'最'})</span><span class="fv" id="c_${h}_${t}_${f}">0</span></div>`; }); html+=`</div>`; });
  html += `</div>`;
  html += `<div class="section-card"><div class="section-title">血統まとめ</div>
    <div class="blood-box bb-mg">面白い(肌肌:緑) <div class="btags" id="b_${h}_mg"></div></div>
    <div class="blood-box bb-mb">見事(肌肌:水) <div class="btags" id="b_${h}_mb"></div></div>
    <div class="blood-box bb-mp">面白見事(肌種:桃) <div class="btags" id="b_${h}_mp"></div></div>
    <div class="blood-box bb-ms">面白見事(肌馬:橙) <div class="btags" id="b_${h}_ms"></div></div>
  </div>`;
  html += `<div class="horse-header mare">牝馬 ${h+1}</div>`;
  html += `<div class="section-card"><div class="section-title">肌種馬</div>${mkMx(h,'m1',15)}</div>`;
  html += `<div class="section-card"><div class="section-title">肌肌馬</div>${mkMx(h,'m2',15)}</div>`;
  html += `<div class="section-card"><div class="section-title">肌馬</div>${mkMx(h,'m3',15)}</div>`;
  document.getElementById('tab'+h).innerHTML = html;
}
function mkMx(h,s,rows){
  let t='<table class="pedigree-table"><tr><th>馬名</th><th>因子1</th><th>因子2</th><th>因子3</th><th>血統</th></tr>';
  for(let i=0;i<rows;i++){ t+=`<tr><td><input type="text" oninput="upd(${h})" id="n_${h}_${s}_${i}"></td><td><input type="text" oninput="upd(${h})" id="f1_${h}_${s}_${i}"></td><td><input type="text" oninput="upd(${h})" id="f2_${h}_${s}_${i}"></td><td><input type="text" oninput="upd(${h})" id="f3_${h}_${s}_${i}"></td><td><input type="text" oninput="upd(${h})" id="l_${h}_${s}_${i}"></td></tr>`; }
  return t+'</table>';
}
function upd(h){
  let sc={}, mc={}; FACTORS.forEach(f=>{sc[f]=0;mc[f]=0;});
  for(let i=0;i<15;i++){ [1,2,3].forEach(n=>{ let v=document.getElementById(`f${n}_${h}_sdt_${i}`).value; if(sc.hasOwnProperty(v))sc[v]++; }); }
  for(let i=0;i<15;i++){ [1,2,3].forEach(n=>{ let v=document.getElementById(`f${n}_${h}_m3_${i}`).value; if(mc.hasOwnProperty(v))mc[v]++; }); }
  FACTORS.forEach(f=>{
    document.getElementById(`c_${h}_s_${f}`).textContent=sc[f];
    document.getElementById(`c_${h}_m_${f}`).textContent=mc[f];
    document.getElementById(`c_${h}_f_${f}`).textContent=sc[f]+mc[f];
  });
  setB(h,'mg','m2',[0,5]); setB(h,'mb','m2',[8,12]); setB(h,'mp','m1',[0]); setB(h,'ms','m3',[0,5,8]);
}
function setB(h,id,s,idx){
  let arr=[]; idx.forEach(i=>{ let v=document.getElementById(`l_${h}_${s}_${i}`).value; if(v)arr.push(`<span class="btag">${v}</span>`); });
  document.getElementById(`b_${h}_${id}`).innerHTML=arr.join('');
}
function clearAll(h){ document.getElementById('tab'+h).querySelectorAll('input').forEach(i=>i.value=''); upd(h); }
function switchTab(idx){ for(let i=0;i<N;i++){ document.querySelectorAll('.tab-btn')[i].classList.toggle('active',i===idx); document.getElementById('tab'+i).classList.toggle('active',i===idx); } }
for(let h=0;h<N;h++) build(h);
</script>
</body>
</html>
